# ============================================================
# build.yml
# Builds firmware and creates GitHub Release on tags.
# After a successful release, pages.yml automatically
# rebuilds and redeploys the website.
#
# Triggers:
#   - Tag: 2026.4.0        → stable release
#   - Tag: 2026.4.0b1      → pre-release (beta)
#   - workflow_dispatch     → manual trigger
# ============================================================

name: ESPHome Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 2026.4.0b1)"
        required: false
        default: ""

  push:
    tags:
      - '[0-9][0-9][0-9][0-9].*'

jobs:
  # ── 1. Validate ──────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ESPHome
        run: pip install esphome

      - name: Validate ci-validate.yaml
        run: esphome config firmware/ci-validate.yaml

      - name: Validate filascale_factory.yaml
        run: esphome config firmware/filascale_factory.yaml

  # ── 2. Build factory firmware ────────────────────────────
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Determine pre-release
        id: prerelease
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$VERSION" == *"b"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Build factory firmware
        id: esphome-build
        uses: esphome/build-action@v6
        with:
          yaml-file: firmware/filascale_factory.yaml
          complete-manifest: true
          release-url: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.version }}
          release-summary: "FilaScale ${{ steps.version.outputs.version }}"

      - name: Prepare release assets
        run: |
          BUILD_DIR="${{ steps.esphome-build.outputs.name }}"

          cp "${BUILD_DIR}/"*.factory.bin ./filascale_factory.bin
          cp "${BUILD_DIR}/"*.ota.bin     ./filascale_ota.bin

          jq '.builds[0].parts[0].path = "filascale_factory.bin" |
              .builds[0].ota.path = "filascale_ota.bin"' \
            "${BUILD_DIR}/manifest.json" > ./manifest-filascale.json

          echo "Assets prepared:"
          ls -la ./filascale_factory.bin ./filascale_ota.bin ./manifest-filascale.json
          cat ./manifest-filascale.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "FilaScale ${{ steps.version.outputs.version }}"
          prerelease: ${{ steps.prerelease.outputs.prerelease }}
          generate_release_notes: true
          files: |
            ./filascale_factory.bin
            ./filascale_ota.bin
            ./manifest-filascale.json
          body: |
            **Web Installer:** https://christophcaina.github.io/FilaScale/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
