# ============================================================
# validate.yml
# Runs on every PR — validates ESPHome YAML syntax only.
# No firmware is compiled here (fast feedback).
#
# Triggers:
#   - Pull Request → any branch
# ============================================================

name: Validate

on:
  pull_request:
    paths:
      - "firmware/**"
      - ".github/workflows/validate.yml"

jobs:
  validate:
    name: ESPHome Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache ESPHome pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: esphome-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: esphome-pip-

      - name: Install ESPHome
        run: pip install esphome --quiet

      - name: Validate filascale.yaml
        run: |
          esphome config firmware/filascale.yaml

      - name: Validate filascale_factory.yaml
        run: |
          esphome config firmware/filascale_factory.yaml
