sensor:
  - platform: template
    id: active_spool_id_sensor
    name: "Active Spool ID"
    icon: mdi:database-arrow-right
    accuracy_decimals: 0
    state_class: measurement
    web_server:
      sorting_group_id: group_nfc
      sorting_weight: 3

# ── Scripts ─────────────────────────────────────────────────

script:
  # Spoolman UID-Lookup
  - id: nfc_spoolman_lookup
    then:
      - lambda: |-
          std::string uid = id(nfc_last_uid);
          if (uid.empty()) return;
          ESP_LOGI("nfc", "Looking up UID: %s", uid.c_str());
      - http_request.get:
          url: !lambda |-
            std::string base = id(backend_url).state;
            std::string uid = id(nfc_last_uid);
            // URL-encode UID (replace - with %2D not needed, - is safe)
            return base + "/api/v1/spool?extra_field[nfc_uid]=" + uid +
                   "&allow_archived=false";
          request_headers:
            Content-Type: application/json
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) {
                    ESP_LOGW("nfc", "Spoolman lookup failed: %d", response->status_code);
                    return;
                  }
                  // ESPHome: response body via response->get_string()
                  std::string body = response->get_string();
                  ESP_LOGD("nfc", "Lookup response: %s", body.c_str());

                  // Einfacher JSON-Parser: prüfe ob items leer
                  // Response: {"items": [...], "total": N}
                  auto items_pos = body.find("\"items\":");
                  if (items_pos == std::string::npos) return;

                  // Prüfe ob items leer ist []
                  auto bracket = body.find("[", items_pos);
                  auto close = body.find("]", bracket);
                  if (bracket == std::string::npos || close == std::string::npos) return;

                  std::string items = body.substr(bracket + 1, close - bracket - 1);
                  // Leerzeichen und Newlines entfernen
                  items.erase(remove_if(items.begin(), items.end(), ::isspace), items.end());

                  if (items.empty()) {
                    // UID nicht bekannt → Benutzer muss Spule wählen
                    ESP_LOGI("nfc", "Unknown UID, switching to spool selection");
                    id(menu_page) = 3;  // Page 3: Spule wählen
                    return;
                  }

                  // ID aus erstem Item extrahieren: {"id": N, ...}
                  auto id_pos = body.find("\"id\":");
                  if (id_pos == std::string::npos) return;
                  auto id_start = id_pos + 5;
                  auto id_end = body.find(",", id_start);
                  if (id_end == std::string::npos) id_end = body.find("}", id_start);
                  int spool_id = atoi(body.substr(id_start, id_end - id_start).c_str());

                  if (spool_id <= 0) return;

                  id(active_spool_id) = spool_id;
                  id(active_spool_id_sensor).publish_state(spool_id);
                  ESP_LOGI("nfc", "Spool found: #%d", spool_id);

                  // Zurück zu Home
                  id(menu_page) = 0;
                  id(script_sync_weight).execute();