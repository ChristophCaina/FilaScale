# ============================================================
# filascale-st7920.yaml
# Variante: ST7920 Display, kein NFC-Modul
#
# Für den Web Installer (Erstinstallation).
# Nach dem Flashen: Improv WiFi → HA Discovery → Take Control
# ============================================================

substitutions:
  name: "filascale"
  friendly_name: "FilaScale"
  device_comment: "Filament Scale — ST7920 (kein NFC)"

  backend_ip: ""
  scale_calibration_factor: ""

  pin_status_led:    GPIO02
  pin_display_clk:   GPIO18
  pin_display_mosi:  GPIO23
  pin_display_cs:    GPIO17
  pin_encoder_a:     GPIO32
  pin_encoder_b:     GPIO33
  pin_encoder_btn:   GPIO19
  pin_buzzer:        GPIO16
  pin_scale_dt:      GPIO21
  pin_scale_sck:     GPIO22
  pin_i2c_sda:       GPIO13
  pin_i2c_scl:       GPIO14
  pin_stepper_step:  GPIO25
  pin_stepper_dir:   GPIO26
  pin_filament_sens: GPIO27
  pin_speed_poti:    GPIO34
  pin_addon_detect:  GPIO05

packages:
  filament_scale: github://ChristophCaina/filascale/firmware/filascale.yaml@main
  display:        !include common/display_st7920.yaml
  scale:          !include common/hx_711.yaml

wifi:
  ap:
    ssid: "${name} Fallback"
    password: "filament123"

improv_serial:

esp32_improv:
  authorizer: none

captive_portal:

api:

ota:
  - platform: esphome
  - platform: http_request

dashboard_import:
  package_import_url: github://ChristophCaina/filascale/firmware/filascale-st7920.yaml@main
  import_full_config: false
